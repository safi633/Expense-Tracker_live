<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker Signup</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-page active">
    <div class="glass-card">
      <div class="auth-left">
        <div class="auth-title">Create Account</div>
        <div class="auth-subtitle">Start managing your finances today</div>
        <input class="auth-input" id="suName" type="text" placeholder="Full Name" autocomplete="name" minlength="2" maxlength="60" />
        <input class="auth-input" id="suEmail" type="email" placeholder="Gmail Address" autocomplete="email" pattern="^[a-z0-9](?:[a-z0-9._%+\-]{0,62}[a-z0-9])?@gmail\.com$" />
        <input class="auth-input" id="suUser" type="text" placeholder="Username" autocomplete="username" minlength="3" maxlength="24" pattern="^[a-z0-9_]{3,24}$" />
        <input class="auth-input" id="suPass" type="password" placeholder="Password" autocomplete="new-password" minlength="8" maxlength="72" />
        <button class="grad-btn" onclick="doSignup()">CREATE ACCOUNT</button>
        <div class="auth-switch">Already have an account? <a href="/login.html">Login</a></div>
      </div>
      <div class="auth-right">
        <h2>Why Expense Tracker?</h2>
        <ul>
          <li>• Track daily expenses effortlessly</li>
          <li>• Create and manage monthly budgets</li>
          <li>• Analyze spending patterns & insights</li>
        </ul>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
